<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOC STORE</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Background Glow -->
    <div class="bg-glow glow1"></div>
    <div class="bg-glow glow2"></div>

    <!-- Particle Background -->
    <div class="particles"></div>

    <!-- Navbar -->
    <nav>

        <h1>HOC STORE</h1>

        <ul>
            <li>Home</li>
            <li>Products</li>
            <li>Contact</li>
        </ul>

    </nav>

    <!-- Hero -->
    <section class="hero">

        <h2>Cyber Gaming Shop</h2>

        <p>
            Website bán đồ gaming với animation bằng JavaScript
        </p>

        <button id="shopBtn">
            Mua Ngay
        </button>

    </section>

    <!-- Products -->
    <section class="products">

        <!-- Card 1 -->
        <div class="card">

            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=1200&auto=format&fit=crop">

            <h3>Tai nghe Gaming</h3>

            <p>799.000đ</p>

            <button>Mua</button>

        </div>

        <!-- Card 2 -->
        <div class="card">

            <img src="https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?q=80&w=1200&auto=format&fit=crop">

            <h3>Bàn phím RGB</h3>

            <p>1.299.000đ</p>

            <button>Mua</button>

        </div>

        <!-- Card 3 -->
        <div class="card">

            <img src="https://images.unsplash.com/photo-1527814050087-3793815479db?q=80&w=1200&auto=format&fit=crop">

            <h3>Chuột Wireless</h3>

            <p>499.000đ</p>

            <button>Mua</button>

        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
